<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ZARINA · Natural Apothecary</title>
  <!-- Font Awesome & Google Fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- GLOBAL STYLES (shared header, cart modal, footer, variables) -->
  <link rel="stylesheet" href="global.css">
  
  <!-- PAGE-SPECIFIC STYLES (only for this homepage) -->
  <style>
    /* Hero banner */
    .hero-banner {
      text-align: center;
      padding: 3rem 0 1rem;
    }
    .hero-banner h1 {
      font-size: 3rem;
      background: linear-gradient(135deg, #2C2B26, var(--gold, #C6A43F));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    /* Product grid */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
      margin: 3rem 0;
    }
    .product-card {
      background: var(--off-white, #FFFEF9);
      border-radius: 28px;
      overflow: hidden;
      transition: var(--transition, all 0.3s ease);
      border: 1px solid #F0E3D2;
      text-align: center;
    }
    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow, 0 12px 28px -8px rgba(0,0,0,0.08));
      border-color: var(--gold, #C6A43F);
    }
    .product-img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }
    .product-info {
      padding: 1.2rem;
    }
    .product-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin: 0.8rem 0 0.3rem;
    }
    .product-desc {
      font-size: 0.85rem;
      color: #5C5B57;
      margin-top: 6px;
      margin-bottom: 12px;
    }
    .price {
      font-weight: 700;
      color: var(--gold, #C6A43F);
      font-size: 1.2rem;
      margin: 0.5rem 0;
    }
    .add-to-cart {
      background: none;
      border: 1.5px solid var(--gold, #C6A43F);
      padding: 10px 0;
      width: 100%;
      border-radius: 40px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: var(--transition, all 0.3s ease);
      cursor: pointer;
      background: white;
      color: var(--deep-sage, #5E7A52);
      margin-top: 8px;
    }
    .add-to-cart:hover {
      background: var(--gold, #C6A43F);
      color: #1E1C17;
      transform: scale(0.97);
    }
    /* Responsive */
    @media (max-width: 760px) {
      .container { padding: 0 20px; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="container">
    <div class="navbar">
      <a href="index.html" class="loogo"><div class="logo">ZARINA</div></a>
      <button class="hamburger" aria-label="Menu"><i class="fas fa-bars"></i></button>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="Apothecary.html">Apothecary</a>
        <a href="CountactUS.html">Contact</a>
        <a href="OURstory.html">Our Story</a>
        <a href="About.html">About</a>
        <button class="cart-icon" id="cartIconBtn">
          <i class="fas fa-shopping-bag"></i>
          <span id="cartCountBadge" class="cart-count">0</span>
        </button>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="container">
    <div class="hero-banner">
      <h1>Pure alchemy for skin & soul</h1>
      <p style="margin-top: 0.5rem;">Wildcrafted oils · Raw herbs · Golden rituals</p>
    </div>
    
    <!-- تم تعديل الـ ID ليتعرف عليه الفايربيس -->
    <div id="products-container" class="product-grid"></div>
  </div>
</main>

<!-- Cart modal -->
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h3><i class="fas fa-mortar-pestle"></i> Your remedies</h3>
    <button class="close-cart" id="closeCartBtn"><i class="fas fa-times"></i></button>
  </div>
  <div class="cart-items" id="cartItemsContainer">
    <div class="empty-cart-msg">Your cart is empty, dear one.</div>
  </div>
  <div class="cart-footer">
    <div class="total">
      <span>Total</span>
      <span id="cartTotalPrice">$0.00</span>
    </div>
    <button class="checkout-action" id="proceedCheckoutBtn"><i class="fas fa-feather-alt"></i> Proceed to Checkout</button>
  </div>
</div>

<!-- Footer -->
<footer>
  <div class="footer-icons">
    <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
    <a href="#" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
    <a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
  </div>
  <p>Zarina Raw Ingredients — pure, wild, intentional. <i class="fas fa-leaf"></i></p>
  <p style="margin-top: 8px; font-size:0.75rem;">&copy; 2025 Zarina Apothecary · Ancient wisdom for modern skin</p>
</footer>

<!-- استدعاء إعدادات فايربيس -->
<script type="module" src="firebase-config.js"></script>

<!-- ملفاتك العادية -->
<script type="module" src="global.js"></script>

</body>
</html>
