<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZARINA · Admin Dashboard</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:opsz,wght@14..32,300;400;500;600&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="global.css">
  
  <style>
    /* تنسيقات خاصة بلوحة التحكم فقط */
    body {
      background-color: #F4EFE6; 
      font-family: 'Tajawal', sans-serif;
    }

    .admin-header {
      background: var(--off-white, #FFFEF9);
      padding: 1rem 2rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.03);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--gold, #C6A43F);
    }
    
    .admin-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--forest-green, #2F5D3A);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* التعديل هون: تصميم زر تسجيل الخروج */
    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
      font-weight: 600;
      color: #4A463E;
    }
    
    .btn-logout {
      background: none;
      border: 1px solid #C94C4C;
      color: #C94C4C;
      padding: 5px 12px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .btn-logout:hover {
      background: #C94C4C;
      color: white;
    }

    .admin-container {
      max-width: 1400px;
      margin: 2rem auto;
      padding: 0 20px;
    }

    /* ===== الإحصائيات (Stats) ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }
    .stat-card {
      background: var(--off-white, #FFFEF9);
      border-radius: 20px;
      padding: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      box-shadow: var(--shadow, 0 12px 28px -8px rgba(0,0,0,0.08));
      border: 1px solid #EADBC6;
      border-right: 5px solid var(--gold, #C6A43F);
    }
    .stat-icon {
      width: 60px;
      height: 60px;
      background: #F0EBE1;
      border-radius: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.8rem;
      color: var(--gold, #C6A43F);
    }
    .stat-info h4 {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 5px;
      font-family: 'Tajawal', sans-serif;
    }
    .stat-info .number {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--black-rich, #1F1E1A);
    }

    /* ===== الشبكة الرئيسية (الفورم + الجدول) ===== */
    .dashboard-layout {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 2rem;
    }
    @media (max-width: 992px) {
      .dashboard-layout {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: var(--off-white, #FFFEF9);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: var(--shadow, 0 12px 28px -8px rgba(0,0,0,0.08));
      border: 1px solid #EADBC6;
    }
    .panel h2 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      color: var(--forest-green, #2F5D3A);
      border-bottom: 1px dashed #EADBC6;
      padding-bottom: 10px;
    }

    /* ===== فورم إضافة منتج ===== */
    .form-group {
      margin-bottom: 1.2rem;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: #4A463E;
    }
    .form-control {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #D9CBB5;
      border-radius: 12px;
      background: #FCF8F0;
      font-family: inherit;
      transition: all 0.3s ease;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--gold, #C6A43F);
      box-shadow: 0 0 0 3px rgba(198, 164, 63, 0.15);
    }
    .btn-submit {
      width: 100%;
      background: var(--gold, #C6A43F);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition, all 0.3s ease);
      margin-top: 10px;
    }
    .btn-submit:hover {
      background: var(--forest-green, #2F5D3A);
    }

    /* ===== جدول المنتجات ===== */
    .table-responsive {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      text-align: right;
      padding: 15px;
      background: #F0EBE1;
      color: var(--black-rich, #1F1E1A);
      font-weight: 600;
      border-radius: 8px 8px 0 0;
    }
    td {
      padding: 15px;
      border-bottom: 1px solid #EADBC6;
      vertical-align: middle;
    }
    .prod-img-mini {
      width: 50px;
      height: 50px;
      border-radius: 10px;
      object-fit: cover;
    }

    /* ===== أزرار التحكم (إخفاء / حذف) ===== */
    .action-btns {
      display: flex;
      gap: 10px;
    }
    .btn-icon {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 5px;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .btn-toggle { color: var(--sage, #7B9C6E); }
    .btn-toggle.hidden { color: #A09E98; }
    .btn-delete { color: #C94C4C; }
    
    .btn-icon:hover {
      background: #F0EBE1;
    }

    /* CSS Toggle Switch لزر الإخفاء والإظهار */
    .switch {
      position: relative;
      display: inline-block;
      width: 46px;
      height: 24px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 34px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider { background-color: var(--gold, #C6A43F); }
    input:checked + .slider:before { transform: translateX(22px); }

  </style>
</head>
<body>

  <header class="admin-header">
    <div class="admin-title">
      <i class="fas fa-leaf"></i>
      ZARINA Admin
    </div>
    <div class="user-info">
      <span>مرحباً، يا هندسة 👋</span>
      <button id="btnLogout" class="btn-logout"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </div>
  </header>

  <div class="admin-container">
    <div class="stats-controls" style="display: flex; gap: 15px; margin-bottom: 20px; justify-content: flex-end;">
      <button id="btnResetVisitors" style="background: #F0EBE1; border: 1px solid #D9CBB5; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; color: #4A463E; font-family: inherit;">
        <i class="fas fa-users-slash"></i> تصفير الزوار
      </button>
      <button id="btnResetOrders" style="background: #F0EBE1; border: 1px solid #D9CBB5; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; color: #C94C4C; font-family: inherit;">
        <i class="fas fa-trash-alt"></i> مسح وتصفير الطلبات والأرباح
      </button>
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-dollar-sign"></i></div>
        <div class="stat-info">
          <h4>إجمالي الأرباح</h4>
          <div class="number" id="adminTotalEarnings">$0.00</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-shopping-bag"></i></div>
        <div class="stat-info">
          <h4>الطلبات المكتملة</h4>
          <div class="number" id="adminTotalOrders">0</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-users"></i></div>
        <div class="stat-info">
          <h4>زوار الموقع (مباشر)</h4>
          <div class="number" id="adminLiveVisitors">0</div>
        </div>
      </div>
    </div>

    <div class="dashboard-layout">
      
      <div class="panel">
        <h2><i class="fas fa-plus-circle"></i> إضافة منتج جديد</h2>
        <form id="addProductForm">
          <div class="form-group">
            <label>اسم المنتج (عربي) - nameAr</label>
            <input type="text" id="prodNameAr" class="form-control" placeholder="مثال: زبدة الشيا الخام" required>
          </div>
          <div class="form-group">
            <label>اسم المنتج (إنجليزي) - nameEn</label>
            <input type="text" id="prodNameEn" class="form-control" placeholder="e.g. Raw Shea Butter" required>
          </div>
          <div class="form-group">
            <label>التصنيف (عربي) - categoryAr</label>
            <input type="text" id="prodCatAr" class="form-control" placeholder="مثال: زبدة" required>
          </div>
          <div class="form-group">
            <label>التصنيف (إنجليزي) - categoryEn</label>
            <input type="text" id="prodCatEn" class="form-control" placeholder="e.g. Butter" required>
          </div>
          <div class="form-group">
            <label>وصف المنتج (عربي) - descAr</label>
            <input type="text" id="prodDescAr" class="form-control" placeholder="المكونات الخام الطبيعية" required>
          </div>
          <div class="form-group">
            <label>وصف المنتج (إنجليزي) - descEn</label>
            <input type="text" id="prodDescEn" class="form-control" placeholder="RAW INGREDIENTS" required>
          </div>
          <div class="form-group">
            <label>السعر ($) - price</label>
            <input type="number" step="0.01" id="prodPrice" class="form-control" placeholder="3.75" required>
          </div>
          <div class="form-group">
            <label>رابط الصورة (URL) - imageUrl</label>
            <input type="url" id="prodImg" class="form-control" placeholder="https://..." required>
          </div>
          <div class="form-group">
            <label>التاجات - tags (اكتبها بالإنجليزي وافصل بمسافة)</label>
            <input type="text" id="prodTags" class="form-control" placeholder="skin hair" required>
          </div>
          <button type="submit" class="btn-submit">حفظ وإضافة للمتجر</button>
        </form>
      </div>

      <div class="panel">
        <h2><i class="fas fa-box-open"></i> إدارة المنتجات</h2>
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>الصورة</th>
                <th>اسم المنتج</th>
                <th>السعر</th>
                <th>حالة الظهور</th>
                <th>إجراءات</th>
              </tr>
            </thead>
            <tbody id="adminProductsTable">
              <tr>
                <td><img src="https://placehold.co/60x60?text=Shea" class="prod-img-mini"></td>
                <td><strong>زبدة الشيا الخام</strong><br><small style="color:#666;">Raw Shea Butter</small></td>
                <td style="color: var(--gold); font-weight: bold;">$3.75</td>
                <td>
                  <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                  </label>
                </td>
                <td>
                  <button class="btn-icon btn-delete" title="حذف المنتج"><i class="fas fa-trash-alt"></i></button>
                </td>
              </tr>
              </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="admin.js"></script>

</body>
</html>
