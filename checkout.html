<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ZARINA · Checkout</title>
  <!-- Font Awesome & Google Fonts (required for icons and typography) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- GLOBAL STYLES -->
  <link rel="stylesheet" href="global.css">
  
  <!-- PAGE-SPECIFIC STYLES -->
  <style>
    /* الحل السحري لمشكلة الـ Footer */
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
    }
    main {
      flex: 1; /* هذا السطر بيجبر المحتوى يتمدد ويدفش الفوتر لتحت */
    }

    /* Checkout two-column grid */
    .checkout-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 3rem;
      margin: 3rem 0;
    }
    
    /* Order Summary */
    .order-summary {
      background: var(--off-white, #FFFEF9);
      border-radius: 28px;
      padding: 1.8rem;
      border: 1px solid #F0E3D2;
      box-shadow: var(--shadow, 0 12px 28px -8px rgba(0,0,0,0.08));
      height: fit-content; /* عشان ما يتمطط مع الفورم */
    }
    .order-summary h2 {
      font-size: 1.8rem;
      margin-bottom: 1.2rem;
      border-left: 4px solid var(--gold, #C6A43F);
      padding-left: 1rem;
    }
    .summary-item {
      display: flex;
      justify-content: space-between;
      padding: 0.8rem 0;
      border-bottom: 1px solid #EADBC6;
    }
    .summary-details {
      font-weight: 500;
    }
    .summary-total {
      margin-top: 1rem;
      font-size: 1.3rem;
      font-weight: 800;
      display: flex;
      justify-content: space-between;
      border-top: 2px solid var(--gold, #C6A43F);
      padding-top: 1rem;
    }
    
    /* Customer Form */
    .checkout-form {
      background: var(--off-white, #FFFEF9);
      border-radius: 28px;
      padding: 1.8rem;
      border: 1px solid #F0E3D2;
    }
    .form-group {
      margin-bottom: 1.2rem;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: var(--black-rich, #1F1E1A);
    }
    input, textarea {
      width: 100%;
      padding: 12px 16px;
      border-radius: 48px;
      border: 1px solid #DCCFBC;
      background: white;
      font-family: inherit;
      transition: 0.2s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--gold, #C6A43F);
      box-shadow: 0 0 0 2px rgba(198,164,63,0.2);
    }
    .confirm-order-btn {
      background: var(--gold, #C6A43F);
      border: none;
      padding: 14px;
      width: 100%;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition, all 0.3s ease);
      margin-top: 0.5rem;
    }
    .confirm-order-btn:hover {
      background: var(--deep-sage, #5E7A52);
      color: white;
    }
    .confirm-order-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .back-link {
      display: inline-block;
      margin-top: 1rem;
      color: var(--deep-sage, #5E7A52);
      text-decoration: none;
      font-weight: 500;
    }
    .back-link:hover {
      color: var(--gold, #C6A43F);
    }

    /* Responsive adjustments */
    @media (max-width: 800px) {
      .checkout-grid {
        grid-template-columns: 1fr;
        gap: 2rem;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="container">
    <div class="navbar">
      <a href="index.html" class="loogo"><div class="logo">ZARINA</div></a>
      <button class="hamburger" aria-label="Menu"><i class="fas fa-bars"></i></button>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="Apothecary.html">Apothecary</a>
        <a href="CountactUS.html">Contact</a>
        <a href="OURstory.html">Our Story</a>
        <a href="About.html">About</a>
        <button class="cart-icon" id="cartIconBtn">
          <i class="fas fa-shopping-bag"></i>
          <span id="cartCountBadge" class="cart-count">0</span>
        </button>
      </div>
    </div>
  </div>
</header>

<!-- الـ Main رح ياخذ مساحة الصفحة المتبقية ليدفش الفوتر -->
<main>
  <div class="container">
    <div class="checkout-grid">
      <!-- Left: Order Summary -->
      <div class="order-summary">
        <h2><i class="fas fa-receipt"></i> Your order</h2>
        <div id="orderItemsList">
          <p>Loading cart...</p>
        </div>
        <div id="orderTotal" class="summary-total">
          <span>Total</span>
          <span>$0.00</span>
        </div>
      </div>

      <!-- Right: Customer Form -->
      <div class="checkout-form">
        <h2><i class="fas fa-feather-alt"></i> Shipping details</h2>
        <form id="checkoutForm">
          <div class="form-group">
            <label for="fullName">Full name</label>
            <input type="text" id="fullName" required placeholder="e.g., Zara Ahmed">
          </div>
          <div class="form-group">
            <label for="phone">Phone number</label>
            <input type="tel" id="phone" required placeholder="+962 79 000 0000">
          </div>
          <div class="form-group">
            <label for="address">Shipping address</label>
            <textarea id="address" rows="2" required placeholder="City, Area, Street..."></textarea>
          </div>
          <button type="submit" class="confirm-order-btn" id="submitBtn"><i class="fas fa-check-circle"></i> Confirm order</button>
        </form>
        <a href="Zarina.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to store</a>
      </div>
    </div>
  </div>
</main>

<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h3><i class="fas fa-mortar-pestle"></i> Your remedies</h3>
    <button class="close-cart" id="closeCartBtn"><i class="fas fa-times"></i></button>
  </div>
  <div class="cart-items" id="cartItemsContainer">
    <div class="empty-cart-msg">Your cart is empty, dear one.</div>
  </div>
  <div class="cart-footer">
    <div class="total">
      <span>Total</span>
      <span id="cartTotalPrice">$0.00</span>
    </div>
    <button class="checkout-action" id="proceedCheckoutBtn"><i class="fas fa-feather-alt"></i> Proceed to Checkout</button>
  </div>
</div>

<footer>
  <div class="footer-icons">
    <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
    <a href="#" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
    <a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
  </div>
  <p>Zarina Raw Ingredients — pure, wild, intentional. <i class="fas fa-leaf"></i></p>
  <p style="margin-top: 8px; font-size:0.75rem;">&copy; 2026 Zarina Apothecary · Ancient wisdom for modern skin</p>
</footer>

<!-- استدعاء ملفات الفايربيس الأساسية -->
<script type="module" src="global.js"></script>

<!-- PAGE-SPECIFIC JAVASCRIPT: معالجة الطلب وإرساله للفايربيس -->
<script type="module">
  import { app } from './firebase-config.js';
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

  const db = getFirestore(app);
  let cart = [];
  let orderTotalAmount = 0;

  function loadCartAndRender() {
    const saved = localStorage.getItem('zarinaCart');
    if (saved) {
      try {
        cart = JSON.parse(saved);
      } catch(e) { cart = []; }
    } else {
      cart = [];
    }
    renderOrderSummary();
  }

  function renderOrderSummary() {
    const container = document.getElementById('orderItemsList');
    const totalSpan = document.querySelector('#orderTotal span:last-child');
    if (!container) return;

    if (!cart || cart.length === 0) {
      container.innerHTML = '<p style="color: #7B6E58;">Your cart is empty. <a href="Zarina.html" style="color: var(--gold); text-decoration: underline;">Continue shopping</a></p>';
      if (totalSpan) totalSpan.innerText = '$0.00';
      const btn = document.getElementById('submitBtn');
      if(btn) btn.disabled = true; // تعطيل زر الطلب إذا السلة فارغة
      return;
    }

    let itemsHtml = '';
    orderTotalAmount = 0;
    
    cart.forEach(item => {
      const itemTotal = item.price * item.quantity;
      orderTotalAmount += itemTotal;
      itemsHtml += `
        <div class="summary-item">
          <div class="summary-details">
            <strong>${escapeHtml(item.name)}</strong> <span style="color: #7B6E58;">x ${item.quantity}</span>
          </div>
          <div style="font-weight: 600;">$${itemTotal.toFixed(2)}</div>
        </div>
      `;
    });
    
    container.innerHTML = itemsHtml;
    if (totalSpan) totalSpan.innerText = `$${orderTotalAmount.toFixed(2)}`;
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // إرسال الطلب للفايربيس
  const form = document.getElementById('checkoutForm');
  if (form) {
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      if (cart.length === 0) {
        alert('Your cart is empty. Please add some items before checkout.');
        return;
      }
      
      const name = document.getElementById('fullName').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const address = document.getElementById('address').value.trim();
      const submitBtn = document.getElementById('submitBtn');

      // تغيير شكل الزر لـ جاري التحميل
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
      submitBtn.disabled = true;

      try {
        // تجهيز بيانات الطلب ورفعها للفايربيس بقسم orders
        await addDoc(collection(db, "orders"), {
          customerName: name,
          customerPhone: phone,
          customerAddress: address,
          items: cart, // المنتجات اللي اشتراها
          totalAmount: orderTotalAmount, // المجموع الكلي
          status: "Pending", // حالة الطلب (قيد الانتظار)
          createdAt: serverTimestamp() // وقت الطلب الحقيقي
        });

        alert(`✨ Thank you, ${name}! ✨\nYour order has been received successfully.\nA Zarina alchemist will prepare your remedies soon.`);

        // مسح السلة من المتصفح بعد نجاح الطلب
        localStorage.removeItem('zarinaCart');
        
        // إعادة توجيه للصفحة الرئيسية
        window.location.href = 'Zindex.html';

      } catch (error) {
        console.error("Error adding order: ", error);
        alert("Failed to send order. Please check your internet connection and try again.");
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
      }
    });
  }

  // تشغيل الصفحة
  loadCartAndRender();
</script>
</body>
</html>
