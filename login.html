<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZARINA · Admin Login</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  
  <style>
    body {
      background-color: #F4EFE6;
      font-family: 'Tajawal', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-card {
      background: var(--off-white, #FFFEF9);
      padding: 3rem 2.5rem;
      border-radius: 24px;
      box-shadow: var(--shadow, 0 12px 28px -8px rgba(0,0,0,0.08));
      width: 100%;
      max-width: 400px;
      text-align: center;
      border: 1px solid #EADBC6;
      border-top: 5px solid var(--gold, #C6A43F);
    }
    .login-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--forest-green, #2F5D3A);
      margin-bottom: 0.5rem;
    }
    .login-subtitle {
      color: #666;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
      text-align: right;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #4A463E;
    }
    .form-control {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #D9CBB5;
      border-radius: 12px;
      background: #FCF8F0;
      font-family: inherit;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--gold, #C6A43F);
    }
    .btn-login {
      width: 100%;
      background: var(--gold, #C6A43F);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }
    .btn-login:hover {
      background: var(--forest-green, #2F5D3A);
    }
    #errorMsg {
      color: #C94C4C;
      font-size: 0.9rem;
      margin-top: 15px;
      display: none;
    }

    @media (max-width: 480px) {
      body {
        padding: 1rem;
        align-items: flex-start;
        padding-top: 12vh;
      }

      .login-card {
        padding: 2rem 1.25rem;
        border-radius: 18px;
      }

      .login-logo {
        font-size: 1.85rem;
      }
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-logo"><i class="fas fa-leaf"></i> ZARINA</div>
    <div class="login-subtitle">لوحة تحكم الإدارة - الرجاء تسجيل الدخول</div>
    
    <form id="loginForm">
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="adminEmail" class="form-control" placeholder="admin@zarina.com" required>
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="adminPassword" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">تسجيل الدخول</button>
      <div id="errorMsg">البريد الإلكتروني أو كلمة المرور غير صحيحة!</div>
    </form>
  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
